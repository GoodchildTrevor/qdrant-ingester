services:
  qdrant-ingester:
    build: .
    container_name: qdrant_ingester
    restart: unless-stopped
    environment:
      API_KEY: ${API_KEY:?API_KEY is required}
      DOCUMENT_CHUNKER_URL: ${DOCUMENT_CHUNKER_URL:?DOCUMENT_CHUNKER_URL is required}
      QDRANT_HOST: ${QDRANT_HOST:?QDRANT_HOST is required}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY is required}
      DENSE_MODEL_NAME: ${DENSE_MODEL_NAME:-sentence-transformers/paraphrase-multilingual-mpnet-base-v2}
      SPARSE_MODEL_NAME: ${SPARSE_MODEL_NAME:-Qdrant/bm25}
      BATCH_SIZE: ${BATCH_SIZE:-16}
      UPSERT_BATCH_SIZE: ${UPSERT_BATCH_SIZE:-16}
      SCROLL_LIMIT: ${SCROLL_LIMIT:-1000}
      CHUNK_SIZE: ${CHUNK_SIZE:-512}
      OVERLAP: ${OVERLAP:-1}
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:1.17.1
    container_name: qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY is required}
    expose:
      - "6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: qdrant_ingester_test
    environment:
      API_KEY: ${API_KEY:?API_KEY is required}
      DOCUMENT_CHUNKER_URL: ${DOCUMENT_CHUNKER_URL:?DOCUMENT_CHUNKER_URL is required}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY is required}
      DENSE_MODEL_NAME: ${DENSE_MODEL_NAME:-sentence-transformers/paraphrase-multilingual-mpnet-base-v2}
      SPARSE_MODEL_NAME: ${SPARSE_MODEL_NAME:-Qdrant/bm25}
      BATCH_SIZE: ${BATCH_SIZE:-16}
      UPSERT_BATCH_SIZE: ${UPSERT_BATCH_SIZE:-16}
      SCROLL_LIMIT: ${SCROLL_LIMIT:-1000}
      CHUNK_SIZE: ${CHUNK_SIZE:-512}
      OVERLAP: ${OVERLAP:-1}
    depends_on:
      qdrant:
        condition: service_healthy
    profiles:
      - test

volumes:
  qdrant_data: